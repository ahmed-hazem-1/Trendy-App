# Cloud Build configuration for Trendy
#
# Triggered on push to main branch.
# Required Cloud Build substitution variables (set in Console or trigger config):
#   _VITE_SUPABASE_URL              — Supabase project URL
#   _VITE_SUPABASE_PUBLISHABLE_KEY  — Supabase anon/publishable key
#   _REGION                         — Cloud Run region, e.g. us-central1
#   _SERVICE                        — Cloud Run service name, e.g. trendy-app

steps:
  # 1. Build the Docker image, injecting Vite build-time env vars
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "--build-arg"
      - "VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}"
      - "--build-arg"
      - "VITE_SUPABASE_PUBLISHABLE_KEY=${_VITE_SUPABASE_PUBLISHABLE_KEY}"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_SERVICE}:latest"
      - "."

  # 2. Push both tags to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "gcr.io/$PROJECT_ID/${_SERVICE}"]

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - "--image=gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=256Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"

images:
  - "gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/${_SERVICE}:latest"

substitutions:
  _REGION: us-central1
  _SERVICE: trendy-app

options:
  logging: CLOUD_LOGGING_ONLY
