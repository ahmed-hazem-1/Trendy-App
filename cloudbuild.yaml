# Cloud Build configuration for Trendy
#
# Triggered automatically on push to main.
# The Artifact Registry repo is created automatically on first run.
#
# Required IAM roles for the Cloud Build service account
# ([PROJECT_NUMBER]@cloudbuild.gserviceaccount.com):
#   - Artifact Registry Writer
#   - Cloud Run Admin
#   - Service Account User (on the Compute default SA)
#
# Substitution variables to set in the trigger:
#   _REGION   — Cloud Run region, e.g. us-central1
#   _SERVICE  — Cloud Run service name, e.g. trendy-app
#   _AR_REPO  — Artifact Registry repo name, e.g. trendy
#
# Vite env vars are read from .env.production (committed to repo).
# No build-arg substitutions needed.

steps:
  # 0. Create the Artifact Registry repo if it doesn't exist yet (safe to re-run)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - "-c"
      - |
        gcloud artifacts repositories describe ${_AR_REPO} \
          --location=${_REGION} --project=$PROJECT_ID \
          > /dev/null 2>&1 || \
        gcloud artifacts repositories create ${_AR_REPO} \
          --repository-format=docker \
          --location=${_REGION} \
          --project=$PROJECT_ID

  # 1. Build the Docker image (.env.production is committed — no build args needed)
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest"
      - "."

  # 2. Push both tags to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}"

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=256Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest"

substitutions:
  _REGION: us-central1
  _SERVICE: trendy-app
  _AR_REPO: trendy

options:
  logging: CLOUD_LOGGING_ONLY
